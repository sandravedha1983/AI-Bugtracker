<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email - AI Bug Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .otp-input:focus {
            letter-spacing: 1rem;
            text-align: center;
        }
    </style>
</head>

<body class="bg-slate-950 flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">
            <div class="bg-indigo-600 p-8 text-center">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-white/20 rounded-full mb-4">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                        </path>
                    </svg>
                </div>
                <h2 class="text-2xl font-bold text-white">Verify Your Email</h2>
                <p class="text-indigo-100 mt-2">Enter the 6-digit code sent to<br><span
                        class="font-semibold text-white">{{ email }}</span></p>
            </div>

            <div class="p-8">
                {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                {% for category, message in messages %}
                <div
                    class="mb-6 p-4 rounded-xl text-sm {{ 'bg-red-50 text-red-700' if category == 'danger' else 'bg-blue-50 text-blue-700' }}">
                    {{ message }}
                </div>
                {% endfor %}
                {% endif %}
                {% endwith %}

                <form action="{{ url_for('main.verify_otp') }}" method="POST" class="space-y-6">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <input type="hidden" name="email" value="{{ email }}">
                    <div>
                        <label for="otp" class="block text-sm font-semibold text-slate-700 mb-2">Verification
                            Code</label>
                        <input type="text" id="otp" name="otp" maxlength="6" required autofocus
                            class="w-full px-4 py-4 border-2 border-slate-100 rounded-2xl text-center text-3xl font-bold tracking-[0.5em] focus:border-indigo-500 focus:ring-0 outline-none transition-all placeholder:text-slate-200"
                            placeholder="000000">
                    </div>

                    <button type="submit"
                        class="w-full bg-slate-900 hover:bg-black text-white font-bold py-4 rounded-2xl transition-all shadow-lg hover:scale-[1.02] active:scale-[0.98]">
                        Verify Account
                    </button>
                </form>

                <div class="mt-8 pt-6 border-t border-slate-100 text-center">
                    <p class="text-slate-500 text-sm">Didn't receive the code?</p>
                    <form action="{{ url_for('main.resend_verification_request') }}" method="POST" class="mt-2">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <input type="hidden" name="email" value="{{ email }}">
                        <button type="submit"
                            class="text-indigo-600 font-semibold hover:text-indigo-800 transition-colors">
                            Resend New Code
                        </button>
                    </form>
                </div>
            </div>
        </div>
        <div class="text-center mt-8">
            <a href="{{ url_for('main.login') }}"
                class="text-slate-400 hover:text-white transition-colors text-sm font-medium">
                &larr; Back to Login
            </a>
        </div>
    </div>
</body>

</html>
