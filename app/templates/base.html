<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Bug Tracker - Enterprise Edition</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Outfit', sans-serif; }
    </style>
</head>

<body class="bg-slate-50 min-h-screen">
    {% if current_user.is_authenticated %}
    <nav class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 py-4 px-6 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3 group cursor-pointer">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200 group-hover:rotate-12 transition-transform">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                </svg>
            </div>
            <span class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">BugTracker <span class="text-indigo-600">AI</span></span>
        </div>

        <div class="flex items-center gap-6 text-sm font-medium">
            <a href="{{ url_for('main.dashboard') }}" class="nav-link">Dashboard</a>
            <a href="{{ url_for('main.bugs') }}" class="nav-link">Issues</a>
            {% if current_user.role in ['admin', 'lead'] %}
            <a href="{{ url_for('analytics.dashboard') }}" class="nav-link">Analytics</a>
            {% endif %}
        </div>

        <div class="flex items-center gap-4">
            <button id="themeToggle" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500">
                <svg class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                <svg class="w-5 h-5 hidden dark:block text-yellow-400" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            </button>
            <div class="h-8 w-[1px] bg-slate-200"></div>
            <div class="flex items-center gap-3">
                <div class="text-right">
                    <p class="text-sm font-bold text-slate-900 dark:text-white">{{ current_user.name }}</p>
                    <p class="text-xs text-indigo-600 font-semibold">{{ current_user.role|capitalize }}</p>
                </div>
                <div class="w-10 h-10 rounded-full bg-slate-200 flex items-center justify-center font-bold text-slate-600">
                    {{ current_user.name[0]|upper }}
                </div>
            </div>
            <a href="{{ url_for('main.logout') }}" class="text-slate-500 hover:text-red-600 p-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            </a>
        </div>
    </nav>
    {% endif %}

    <main class="max-w-7xl mx-auto p-6">
        {% block content %}{% endblock %}
    </main>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        if (themeToggle) {
            themeToggle.onclick = () => {
                const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
                if (isDark) document.body.classList.remove('dark');
                else document.body.classList.add('dark');
            }
        }

        // Show flash messages as SweetAlert2 toasts
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    Swal.fire({
                        toast: true,
                        position: 'top-end',
                        showConfirmButton: false,
                        timer: 3000,
                        timerProgressBar: true,
                        icon: '{{ "error" if category == "danger" else "warning" if category == "warning" else "success" if category == "success" else "info" }}',
                        title: '{{ message }}'
                    });
                {% endfor %}
            {% endif %}
        {% endwith %}
    </script>
</body>
</html>
