{% extends "base.html" %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[60vh] text-center px-4">
    <div class="bg-red-50 p-8 rounded-full mb-8">
        <svg class="w-20 h-20 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
        </svg>
    </div>
    <h1 class="text-4xl font-extrabold text-slate-900 mb-4">Something went wrong</h1>
    <p class="text-xl text-slate-600 mb-8 max-w-md">The server encountered an internal error. We've logged the incident and will look into it.</p>
    <a href="{{ url_for('main.index') }}" class="px-8 py-3 bg-indigo-600 text-white rounded-xl font-bold shadow-lg shadow-indigo-200 hover:bg-indigo-700 transition-all">
        Go Back Home
    </a>
</div>
{% endblock %}
