{% extends "base.html" %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[60vh] text-center px-4">
    <div class="bg-indigo-50 p-8 rounded-full mb-8">
        <svg class="w-20 h-20 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 9.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
    </div>
    <h1 class="text-4xl font-extrabold text-slate-900 mb-4">Page Not Found</h1>
    <p class="text-xl text-slate-600 mb-8 max-w-md">Sorry, we couldn't find the page you were looking for. It might have been moved or deleted.</p>
    <a href="{{ url_for('main.index') }}" class="px-8 py-3 bg-indigo-600 text-white rounded-xl font-bold shadow-lg shadow-indigo-200 hover:bg-indigo-700 transition-all">
        Go Back Home
    </a>
</div>
{% endblock %}
